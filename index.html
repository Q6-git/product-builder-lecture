<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --button-bg: #4a90e2;
            --button-hover: #357abd;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f0f2f5;
            --button-bg: #357abd;
            --button-hover: #4a90e2;
            --shadow: rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            position: relative;
            text-align: center;
            background: var(--container-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
            width: 320px;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        h1 { margin-bottom: 2rem; font-size: 1.5rem; }

        #lotto-numbers {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
            min-height: 50px;
            flex-wrap: wrap;
        }

        .ball {
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: bounce 0.4s ease;
        }

        .generate-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background-color: var(--button-bg);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }

        .generate-btn:hover { background-color: var(--button-hover); }
        
        /* 로또 공 색상 규정 */
        .color-1 { background: #fbc400; } /* 1-10 */
        .color-2 { background: #69c8f2; } /* 11-20 */
        .color-3 { background: #ff7272; } /* 21-30 */
        .color-4 { background: #aaa; }    /* 31-40 */
        .color-5 { background: #b0d840; } /* 41-45 */

        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>
    <h1>로또 번호 추천</h1>
    <div id="lotto-numbers"></div>
    <button class="generate-btn" onclick="generateLotto()">번호 생성하기</button>
</div>

<script>
    // Theme logic
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'dark');
        } else {
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'light');
        }
    }

    // Load saved theme
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-btn').innerText = '🌙';
    }

    // Lotto logic
    function generateLotto() {
        const container = document.getElementById('lotto-numbers');
        container.innerHTML = ''; 

        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        numbers.sort((a, b) => a - b);

        numbers.forEach(num => {
            const ball = document.createElement('div');
            ball.className = 'ball ' + getColorClass(num);
            ball.innerText = num;
            container.appendChild(ball);
        });
    }

    function getColorClass(num) {
        if (num <= 10) return 'color-1';
        if (num <= 20) return 'color-2';
        if (num <= 30) return 'color-3';
        if (num <= 40) return 'color-4';
        return 'color-5';
    }
</script>

</body>
</html>
