<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 2rem; }
        #lotto-numbers {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
            min-height: 60px;
        }
        .ball {
            width: 50px;
            height: 50px;
            line-height: 50px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: bounce 0.4s ease;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #357abd; }
        
        /* 로또 공 색상 규정 */
        .color-1 { background: #fbc400; } /* 1-10 */
        .color-2 { background: #69c8f2; } /* 11-20 */
        .color-3 { background: #ff7272; } /* 21-30 */
        .color-4 { background: #aaa; }    /* 31-40 */
        .color-5 { background: #b0d840; } /* 41-45 */

        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>로또 번호 추천</h1>
    <div id="lotto-numbers">
        </div>
    <button onclick="generateLotto()">번호 생성하기</button>
</div>

<script>
    function generateLotto() {
        const container = document.getElementById('lotto-numbers');
        container.innerHTML = ''; // 기존 번호 초기화

        const numbers = [];
        while(numbers.length < 6) {
            const num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) {
                numbers.push(num);
            }
        }

        // 번호 정렬
        numbers.sort((a, b) => a - b);

        // 공 생성 및 화면 표시
        numbers.forEach(num => {
            const ball = document.createElement('div');
            ball.className = 'ball ' + getColorClass(num);
            ball.innerText = num;
            container.appendChild(ball);
        });
    }

    function getColorClass(num) {
        if (num <= 10) return 'color-1';
        if (num <= 20) return 'color-2';
        if (num <= 30) return 'color-3';
        if (num <= 40) return 'color-4';
        return 'color-5';
    }
</script>

</body>
</html>
